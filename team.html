<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>全員カレンダー</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, 'Hiragino Sans', sans-serif; background: #f0f2f5; min-height: 100vh; }
  .header { background: #00695C; color: #fff; padding: 14px 20px; text-align: center; font-size: 17px; font-weight: bold; }
  .monthnav { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background:#fff; }
  .navbtn { border: none; background: #E0F2F1; color: #00695C; border-radius: 8px; width: 38px; height: 38px; font-size: 18px; }
  .wrap { padding: 8px; max-width: 560px; margin: 0 auto; }
  .week { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-bottom: 3px; }
  .week .h { text-align: center; font-size: 11px; color: #888; padding: 2px 0; }
  .week .h.sun { color: #E53935; } .week .h.sat { color: #1E88E5; }
  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
  .cell { min-height: 56px; background: #fff; border-radius: 8px; padding: 4px; font-size: 12px; cursor: pointer; border: 1px solid #eee; }
  .cell.blank { background: transparent; border: none; cursor: default; }
  .cell.today { box-shadow: 0 0 0 2px #FF9800 inset; }
  .cell .d { font-weight: bold; color: #444; }
  .cell .d.sun, .cell.holiday .d { color: #E53935; } .cell .d.sat { color: #1E88E5; }
  .cell .wc { margin-top: 4px; font-size: 11px; color: #00695C; font-weight: bold; }
  .cell .wc.low { color: #E53935; }
  .cell.holiday { background: #FFF5F5; }
  /* ボトムシート */
  .overlay { display:none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 50; }
  .overlay.show { display: block; }
  .sheet { position: fixed; left: 0; right: 0; bottom: 0; background: #fff; border-radius: 18px 18px 0 0; padding: 20px; z-index: 51; transform: translateY(100%); transition: transform .25s; max-height: 75vh; overflow-y: auto; }
  .sheet.show { transform: translateY(0); }
  .sheet h2 { font-size: 16px; margin-bottom: 12px; }
  .grp-title { font-size: 12px; color: #888; margin: 12px 0 6px; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { padding: 6px 12px; border-radius: 16px; font-size: 13px; }
  .chip.work { background: #E0F2F1; color: #00695C; }
  .chip.off { background: #ECEFF1; color: #90A4AE; }
  .chip.leave { background: #E0F2F1; color: #00695C; }
  .closebtn { width: 100%; padding: 13px; border: none; border-radius: 10px; background: #00695C; color: #fff; font-weight: bold; margin-top: 16px; }
  .loading { text-align: center; padding: 40px; color: #999; }
  .spinner { width: 36px; height: 36px; border: 4px solid #eee; border-top-color: #00695C; border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="header">👥 全員カレンダー</div>
<div class="monthnav">
  <button class="navbtn" onclick="changeMonth(-1)">‹</button>
  <strong id="monthLabel">—</strong>
  <button class="navbtn" onclick="changeMonth(1)">›</button>
</div>
<div class="wrap">
  <div class="week" id="weekHeader"></div>
  <div id="area"><div class="loading"><div class="spinner"></div>読み込み中...</div></div>
</div>

<div class="overlay" id="overlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <h2 id="sheetTitle"></h2>
  <div id="sheetBody"></div>
  <button class="closebtn" onclick="closeSheet()">閉じる</button>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxNeh517FPMHlPy8b6w3kDVU9ygesSH0fDZqE_z-YpLU1g-ymra8nVa0Lr8i_NM2y-XLw/exec';
const LIFF_ID = '2010271028-8cZArnKP';
const DOW = ['日','月','火','水','木','金','土'];
let userId = null, year, month, data = null;

document.getElementById('weekHeader').innerHTML =
  DOW.map((d,i)=>`<div class="h ${i===0?'sun':i===6?'sat':''}">${d}</div>`).join('');

async function api(p) {
  const res = await fetch(GAS_URL, { method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body: JSON.stringify(Object.assign({userId}, p)) });
  return res.json();
}

async function load() {
  document.getElementById('area').innerHTML = '<div class="loading"><div class="spinner"></div>読み込み中...</div>';
  document.getElementById('monthLabel').textContent = year + '年 ' + month + '月';
  const d = await api({ type:'get_team_calendar', year, month });
  if (!d.success) { document.getElementById('area').innerHTML = '<div class="loading">' + d.message + '</div>'; return; }
  data = d;
  render();
}

function changeMonth(delta) {
  month += delta;
  if (month > 12) { month = 1; year++; }
  if (month < 1) { month = 12; year--; }
  load();
}

function render() {
  const first = new Date(year, month-1, 1).getDay();
  const n = new Date();
  const todayStr = n.getFullYear()+'/'+String(n.getMonth()+1).padStart(2,'0')+'/'+String(n.getDate()).padStart(2,'0');
  const total = data.employees.length;
  let html = '';
  for (let i=0;i<first;i++) html += `<div class="cell blank"></div>`;
  data.days.forEach(day => {
    const dowcls = day.dayOfWeek===0?'sun':day.dayOfWeek===6?'sat':'';
    const hol = day.dayType==='日祝' ? 'holiday' : '';
    const low = day.workingCount <= Math.ceil(total/3) ? 'low' : '';
    const today = day.date===todayStr ? 'today' : '';
    html += `<div class="cell ${hol} ${today}" onclick="openDay(${day.day})">
      <div class="d ${dowcls}">${day.day}</div>
      <div class="wc ${low}">${day.workingCount}人</div>
    </div>`;
  });
  document.getElementById('area').innerHTML = `<div class="grid">${html}</div>`;
}

function openDay(dn) {
  const day = data.days.find(x => x.day === dn);
  if (!day) return;
  document.getElementById('sheetTitle').textContent =
    year + '年' + month + '月' + dn + '日（' + DOW[day.dayOfWeek] + '）' + (day.dayType!=='平日' ? '・' + day.dayType : '');
  const onLeave = day.onLeave || [];
  const work = day.working.length ? day.working.map(n=>`<span class="chip work">${n}</span>`).join('') : '<span style="color:#aaa;font-size:13px;">なし</span>';
  const off  = day.off.length ? day.off.map(n=> onLeave.indexOf(n)>=0
      ? `<span class="chip leave">${n}（有給）</span>`
      : `<span class="chip off">${n}</span>`).join('') : '<span style="color:#aaa;font-size:13px;">なし</span>';
  const halfLeave = day.halfLeave || [];
  const halfHtml = halfLeave.length
    ? `<div class="grp-title">🕐 半休（${halfLeave.length}人）</div><div class="chips">${halfLeave.map(n=>`<span class="chip leave">${n}</span>`).join('')}</div>`
    : '';
  document.getElementById('sheetBody').innerHTML =
    `<div class="grp-title">🟢 出勤予定（${day.working.length}人）</div><div class="chips">${work}</div>` +
    halfHtml +
    `<div class="grp-title">⚪ 休み（${day.off.length}人）</div><div class="chips">${off}</div>`;
  document.getElementById('overlay').classList.add('show');
  document.getElementById('sheet').classList.add('show');
}

function closeSheet() {
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('sheet').classList.remove('show');
}

(async () => {
  const n = new Date(); year = n.getFullYear(); month = n.getMonth() + 1;
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    userId = (await liff.getProfile()).userId;
    await load();
  } catch(e) {
    document.getElementById('area').innerHTML = '<div class="loading">LINEアプリ内から開いてください。</div>';
  }
})();
</script>
</body>
</html>
